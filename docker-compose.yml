services:
  whisper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whisper-subtitles
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-large-v3}
      - DEVICE=${DEVICE:-auto}
      - HTTP_PROXY=${HTTP_PROXY:-http://192.168.78.240:10809}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://192.168.78.240:10809}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,::1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
